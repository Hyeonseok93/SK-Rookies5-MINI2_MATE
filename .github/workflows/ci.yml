name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend (Java 17, H2 test profile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MATE-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Tests run under @ActiveProfiles("test") -> in-memory H2, no MariaDB or secrets required.
      - name: Run backend tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp test

  frontend-ci:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MATE-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Vite 8 requires Node 20.19+, 22.12+, or 24+.
          node-version: "22"
          cache: npm
          cache-dependency-path: MATE-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Advisory-only: surfaces high/critical advisories without failing the pipeline
      # on unresolved transitive issues.
      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true
