# ==========================================
# 공통 애플리케이션 설정
# ==========================================
spring.application.name=Backend-MATE

# 로컬 실행 시 MATE-backend/.env를 properties 형식으로 불러옵니다.
# 운영 환경에서는 같은 이름의 시스템 환경 변수가 우선 적용됩니다.
spring.config.import=optional:file:.env[.properties]

# 기본적으로 활성화할 프로파일 (로컬 개발용인 dev로 설정)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 인증 및 외부 서비스 자격 증명
jwt.secret=${JWT_SECRET}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# CORS (쉼표로 구분, 기본값: 로컬 Vite)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Refresh Token cookie (운영에서는 AUTH_COOKIE_SECURE=true)
auth.refresh-cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.refresh-cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.refresh-cookie.max-age=604800

# 단일 인스턴스 인증 API rate limit
auth.rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
auth.rate-limit.login-limit=${AUTH_LOGIN_RATE_LIMIT:5}
auth.rate-limit.recovery-limit=${AUTH_RECOVERY_RATE_LIMIT:3}
auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}