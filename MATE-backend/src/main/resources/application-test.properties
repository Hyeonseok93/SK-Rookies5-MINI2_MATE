# ==========================================
# In-Memory Database 설정 (H2)
# ==========================================
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:mate_test;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never
spring.flyway.enabled=false

# ==========================================
# 테스트용 자격 증명 (환경변수/개발 DB 비의존)
# ==========================================
jwt.secret=matebackendrookies5springboottokentestkey1234567890qwertyuiop
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
cors.allowed-origins=http://localhost:5173
auth.rate-limit.enabled=false
auth.refresh-cookie.secure=false

# ==========================================
# 로깅 설정
# ==========================================
logging.level.root=WARN
logging.level.com.rookies5.Backend_MATE=INFO
