# ==========================================
# 로컬 MariaDB 접속 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# DB 초기화 스크립트 (data.sql) 설정
# ==========================================
# 💡 always에서 never로 변경! (이제 서버를 켜도 data.sql이 중복 실행되지 않습니다)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 로깅 설정
# ==========================================
logging.level.com.rookies5.Backend_MATE=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}:%line] - %msg%n

# 파일 하나당 최대 크기 (기본 1MB -> 5MB로 증설)
spring.servlet.multipart.max-file-size=5MB

# 한 번의 요청(파일+데이터)에 담긴 전체 크기
spring.servlet.multipart.max-request-size=5MB