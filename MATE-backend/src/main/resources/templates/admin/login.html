<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: Arial; background: #f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:24px; }
        .login-box { background:white; padding:40px; border-radius:10px; box-shadow:0 16px 32px rgba(0,0,0,0.1); width:100%; max-width:400px; }
        h2 { text-align:center; margin-bottom:30px; color:#1e293b; }
        form { display:grid; gap:15px; }
        input { width:100%; height:42px; padding:0 12px; border-radius:5px; border:1px solid #ccc; font:inherit; }
        input:focus { outline:none; border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,0.14); }
        button { width:100%; height:44px; padding:0 12px; border:none; border-radius:5px; background:#6366f1; color:white; font:inherit; font-weight:bold; cursor:pointer; }
        button:hover { background:#4f46e5; }
        .error { color:red; margin-bottom:10px; text-align:center; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>관리자 로그인</h2>

    <!-- 로그인 실패 시 error 파라미터 표시 -->
    <div th:if="${param.error}" class="error">
        이메일 또는 비밀번호가 잘못되었습니다.
    </div>
    <div th:if="${param.logout}" style="color:green; text-align:center; margin-bottom:10px;">
        로그아웃 되었습니다.
    </div>

    <form th:action="@{/admin/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="text" name="username" placeholder="이메일 입력" required>
        <input type="password" name="password" placeholder="비밀번호 입력" required>
        <button type="submit">로그인</button>
    </form>
</div>
</body>
</html>
