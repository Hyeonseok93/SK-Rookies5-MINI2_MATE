  <text x="360" y="154" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">Zustand / Axios</text>
  <text x="360" y="174" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">JWT Silent Refresh</text>

  <g filter="url(#shadow)">
    <rect x="520" y="100" width="200" height="108" rx="14" fill="#FFFFFF" stroke="#D8D4F5" stroke-width="1.5"/>
  </g>
  <text x="620" y="132" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="13" font-weight="700" fill="#6C63FF">Spring Boot</text>
  <text x="620" y="154" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">Security / Service</text>
  <text x="620" y="174" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">Mapper / JPA</text>

  <g filter="url(#shadow)">
    <rect x="520" y="280" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#D8D4F5" stroke-width="1.5"/>
