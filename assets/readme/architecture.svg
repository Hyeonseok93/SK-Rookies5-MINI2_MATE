  <line x1="460" y1="154" x2="520" y2="154" stroke="#8B85C9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="146" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="10" fill="#8B85C9">REST / JWT</text>
  <line x1="720" y1="154" x2="760" y2="154" stroke="#8B85C9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="740" y="146" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="10" fill="#8B85C9">Upload</text>
  <line x1="620" y1="208" x2="620" y2="280" stroke="#8B85C9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="250" font-family="Segoe UI, Pretendard, sans-serif" font-size="10" fill="#8B85C9">JPA</text>
