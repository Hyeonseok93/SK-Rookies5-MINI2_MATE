<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="MATE System Architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F6FF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6C63FF" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8B85C9"/>
    </marker>
  </defs>
  <rect width="920" height="420" rx="20" fill="url(#bg)"/>
  <text x="40" y="42" font-family="Segoe UI, Pretendard, sans-serif" font-size="18" font-weight="700" fill="#2D2A4A">System Architecture</text>
  <text x="40" y="64" font-family="Segoe UI, Pretendard, sans-serif" font-size="12" fill="#6B7280">MATE - Client / Frontend / Backend / Data &amp; Media</text>

  <g filter="url(#shadow)">
    <rect x="40" y="110" width="160" height="88" rx="14" fill="#FFFFFF" stroke="#D8D4F5" stroke-width="1.5"/>
  </g>
  <text x="120" y="148" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="13" font-weight="700" fill="#6C63FF">Browser</text>
  <text x="120" y="170" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">User Client</text>

  <g filter="url(#shadow)">
