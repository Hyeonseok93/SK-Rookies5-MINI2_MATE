  <text x="620" y="336" text-anchor="middle" font-family="Segoe UI, Pretendard, sans-serif" font-size="11" fill="#6B7280">Domain Data</text>

  <g filter="url(#shadow)">
    <rect x="760" y="110" width="120" height="88" rx="14" fill="#FFFFFF" stroke="#D8D4F5" stroke-width="1.5"/>
