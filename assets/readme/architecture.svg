  <line x1="440" y1="92" x2="440" y2="112" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="108" font-family="Segoe UI, Inter, sans-serif" font-size="11" fill="#64748B">HTTPS</text>

